name: wizmart_app
description: WizMart App - Promotores de campo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # Banco local (SQLite reativo)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegação
  go_router: ^14.2.0

  # Câmera e fotos
  image_picker: ^1.1.2
  image: ^4.1.7
  permission_handler: ^11.3.1
  gal: ^1.1.0

  # Localização
  geolocator: ^12.0.0

  # Sessão persistente
  flutter_secure_storage: ^9.2.2

  # Conectividade
  connectivity_plus: ^6.0.3

  # Background sync
  workmanager: ^0.5.2

  # HTTP
  dio: ^5.4.3+1

  # Utilitários
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

dependency_overrides:
  app_links: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
