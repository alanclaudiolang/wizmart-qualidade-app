name: 🐛 Reportar um problema
description: Conte o que deu errado e anexe um vídeo, foto ou áudio.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Como funciona
        Preencha os campos abaixo e clique em **Submit new issue** no fim da página.
        Você não precisa saber nada técnico — quanto mais simples a explicação, melhor.
        Depois que enviar, vamos conversar pelos comentários da página até resolver.

  - type: textarea
    id: o_que_aconteceu
    attributes:
      label: O que aconteceu?
      description: Conta com suas palavras. Pode ser bem curto.
      placeholder: Ex.- "Tirei a foto e ela sumiu, não apareceu na tela."
    validations:
      required: true

  - type: textarea
    id: midia
    attributes:
      label: 📎 Anexe aqui um vídeo, foto ou áudio
      description: |
        **Arraste o arquivo direto pra dentro deste campo** (ou cole, ou clique pra escolher).
        - 🎥 Vídeo da tela é o que mais ajuda
        - 📸 Foto também serve
        - 🎙️ Áudio explicando funciona
        Pode anexar mais de um.
      placeholder: Solte o arquivo aqui...
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Quer acrescentar algo? (opcional)
      description: Qualquer coisa que ache importante.
    validations:
      required: false
