name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'
          cache: true

      - name: Desabilitar analytics
        run: flutter config --no-analytics

      - name: Criar diretório assets
        run: mkdir -p assets/images

      - name: flutter pub get
        run: flutter pub get

      - name: Gerar código Drift
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Configurar local.properties
        run: |
          FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=${{ github.run_number }}" >> android/local.properties

      - name: Build APK release
        run: flutter build apk --release

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: wizmart-app-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Publicar release v-latest
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk wizmart-app-latest.apk
          gh release delete v-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create v-latest \
            wizmart-app-latest.apk \
            --title "WizMart APK — build ${{ github.run_number }}" \
            --notes "Build automático do commit ${{ github.sha }} em $(date -u +'%Y-%m-%d %H:%M UTC')." \
            --target ${{ github.sha }}
