name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Desabilitar analytics
        run: flutter config --no-analytics

      - name: flutter pub get
        run: flutter pub get

      - name: Patch plugins com flutter.compileSdkVersion
        run: |
          PUB_CACHE="$HOME/.pub-cache/hosted/pub.dev"
          echo "Aplicando patch nos plugins problemáticos..."

          for BUILD_GRADLE in $(find "$PUB_CACHE" -name "build.gradle" 2>/dev/null); do
            if grep -q "flutter\.compileSdkVersion\|flutter\.minSdkVersion\|flutter\.targetSdkVersion\|flutter\.ndkVersion" "$BUILD_GRADLE" 2>/dev/null; then
              echo "Patching: $BUILD_GRADLE"
              sed -i \
                -e 's/flutter\.compileSdkVersion/34/g' \
                -e 's/compileSdk flutter\.compileSdkVersion/compileSdk 34/g' \
                -e 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 34/g' \
                -e 's/flutter\.minSdkVersion/21/g' \
                -e 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 21/g' \
                -e 's/flutter\.targetSdkVersion/34/g' \
                -e 's/targetSdkVersion flutter\.targetSdkVersion/targetSdkVersion 34/g' \
                -e 's/flutter\.ndkVersion/"26.1.10909125"/g' \
                "$BUILD_GRADLE"
            fi
          done

          echo "Patch concluído"

      - name: Gerar código Drift
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Criar pasta Android
        run: |
          FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          mkdir -p android/app/src/main/kotlin/com/wizmart/app
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/values-night
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/drawable-v21
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/gradle/wrapper

          # local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

          # gradle-wrapper.properties
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.3-all.zip
          EOF

          # gradle.properties
          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # build.gradle root
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.8.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # settings.gradle
          cat > android/settings.gradle << 'EOF'
          include ':app'
          def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
          def properties = new Properties()
          assert localPropertiesFile.exists()
          localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
          def flutterSdkPath = properties.getProperty("flutter.sdk")
          assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
          apply from: "$flutterSdkPath/packages/flutter_tools/gradle/app_plugin_loader.gradle"
          EOF

          # app/build.gradle
          cat > android/app/build.gradle << 'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
          }
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found. Define flutter.sdk in local.properties.")
          }
          def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
          def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

          android {
              compileSdkVersion 34
              ndkVersion "26.1.10909125"
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions { jvmTarget = '1.8' }
              sourceSets { main.java.srcDirs += 'src/main/kotlin' }
              defaultConfig {
                  applicationId "com.wizmart.app"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }
              buildTypes {
                  release { signingConfig signingConfigs.debug }
              }
          }
          flutter { source '../..' }
          EOF

          # MainActivity.kt
          cat > android/app/src/main/kotlin/com/wizmart/app/MainActivity.kt << 'EOF'
          package com.wizmart.app
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          EOF

          # styles
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">?android:colorBackground</item>
              </style>
          </resources>
          EOF

          cat > android/app/src/main/res/values-night/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
              <style name="NormalTheme" parent="@android:style/Theme.Black.NoTitleBar">
                  <item name="android:windowBackground">?android:colorBackground</item>
              </style>
          </resources>
          EOF

          cat > android/app/src/main/res/drawable/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/white" />
          </layer-list>
          EOF

          cat > android/app/src/main/res/drawable-v21/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/white" />
          </layer-list>
          EOF

          # Ícone placeholder
          for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp "$FLUTTER_ROOT/packages/flutter_tools/templates/app_shared/android.tmpl/app/src/main/res/$dir/ic_launcher.png.img.tmpl" \
               "android/app/src/main/res/$dir/ic_launcher.png" 2>/dev/null || true
          done

          echo "Pasta Android criada"

      - name: Aplicar AndroidManifest WizMart
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.wizmart.app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-feature android:name="android.hardware.camera" android:required="true"/>
              <application
                  android:label="WizMart"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:allowBackup="false"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          EOF

      - name: Build APK release
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wizmart-app-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
