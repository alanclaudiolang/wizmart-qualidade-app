name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Desabilitar analytics
        run: flutter config --no-analytics

      - name: Criar diretório assets
        run: mkdir -p assets/images

      - name: flutter pub get
        run: flutter pub get

      - name: Patch plugins com flutter.compileSdkVersion
        run: |
          PUB_CACHE="$HOME/.pub-cache/hosted/pub.dev"
          echo "Aplicando patch nos plugins..."
          for BUILD_GRADLE in $(find "$PUB_CACHE" -name "build.gradle" 2>/dev/null); do
            if grep -qE "flutter\.(compileSdk|minSdk|targetSdk|ndkVersion)" "$BUILD_GRADLE" 2>/dev/null; then
              echo "Patching: $BUILD_GRADLE"
              sed -i \
                -e 's/flutter\.compileSdkVersion/35/g' \
                -e 's/compileSdk flutter\.compileSdkVersion/compileSdk 35/g' \
                -e 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 35/g' \
                -e 's/flutter\.minSdkVersion/21/g' \
                -e 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 21/g' \
                -e 's/minSdk flutter\.minSdkVersion/minSdk 21/g' \
                -e 's/flutter\.targetSdkVersion/35/g' \
                -e 's/targetSdkVersion flutter\.targetSdkVersion/targetSdkVersion 35/g' \
                -e 's/targetSdk flutter\.targetSdkVersion/targetSdk 35/g' \
                -e 's/flutter\.ndkVersion/"26.1.10909125"/g' \
                "$BUILD_GRADLE"
            fi
          done
          echo "Patch concluído"

      - name: Gerar código Drift
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Instalar Android SDK 35
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            --sdk_root=$ANDROID_HOME 2>/dev/null || true
          echo "SDK 35 instalado"

      - name: Regenerar pasta Android com flutter create
        run: |
          FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          rm -rf android
          flutter create --platforms=android --org com.wizmart --project-name wizmart_app --no-pub .
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          cat android/local.properties

      - name: Corrigir Kotlin e compileSdk no Android gerado
        run: |
          # Atualiza Kotlin de 1.7.10 para 1.9.22 no settings.gradle
          sed -i 's/org.jetbrains.kotlin.android" version "1.7.10"/org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle
          echo "--- settings.gradle (kotlin line) ---"
          grep "kotlin" android/settings.gradle

          # Adiciona compileSdk = 35 no app/build.gradle
          sed -i 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 35/' android/app/build.gradle
          sed -i 's/targetSdk = flutter\.targetSdkVersion/targetSdk = 35/' android/app/build.gradle
          echo "--- app/build.gradle (sdk lines) ---"
          grep -E "compileSdk|targetSdk|ndkVersion" android/app/build.gradle

      - name: Aplicar AndroidManifest WizMart
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.wizmart.app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-feature android:name="android.hardware.camera" android:required="true"/>
              <application
                  android:label="WizMart"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:allowBackup="false"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          EOF

      - name: Build APK release
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wizmart-app-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
