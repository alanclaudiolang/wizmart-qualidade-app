name: Build APK

on:
  push:
    branches: [ main, dev ]
    paths-ignore:
      - 'bug-reports/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'
          cache: true

      - name: Desabilitar analytics
        run: flutter config --no-analytics

      - name: Criar diretório assets
        run: mkdir -p assets/images

      - name: flutter pub get
        run: flutter pub get

      - name: Gerar código Drift
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Configurar local.properties
        run: |
          FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=${{ github.run_number }}" >> android/local.properties

      - name: Computar metadados do build
        id: meta
        env:
          TZ: America/Sao_Paulo
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//' | tr -d ' \r\n')
          TIMESTAMP=$(date +'%Y%m%d-%H%M')
          BUILD_TIME=$(date +'%d/%m/%Y %H:%M')
          # Pra branch dev, marca o APK e o nome fixo de forma que dê
          # pra coexistir com o de produção no mesmo celular (instalável
          # lado a lado, dados isolados — applicationId diferente).
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            CHANNEL="DEV"
            FIXED_NAME="promotor-wizmart-dev.apk"
            APK_NAME="wizmart-app-DEV-v${VERSION}-build${{ github.run_number }}-${TIMESTAMP}.apk"
          else
            CHANNEL="PROD"
            FIXED_NAME="promotor-wizmart.apk"
            APK_NAME="wizmart-app-v${VERSION}-build${{ github.run_number }}-${TIMESTAMP}.apk"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "fixed_name=$FIXED_NAME" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "Canal: $CHANNEL | Versão: $VERSION | Build: ${{ github.run_number }} | Time: $BUILD_TIME (BRT)"
          echo "APK final: $APK_NAME | Fixo: $FIXED_NAME"

      - name: Diferenciar app dev (label + applicationId)
        if: github.ref == 'refs/heads/dev'
        run: |
          # Label visível no launcher do Android.
          sed -i 's|android:label="Promotor Wizmart"|android:label="Promotor Wizmart [DEV]"|' \
            android/app/src/main/AndroidManifest.xml
          # applicationId diferente faz o Android tratar como APP SEPARADO
          # do de produção — instala lado a lado sem conflito, com dados
          # totalmente isolados (DB, SharedPrefs, fotos locais).
          sed -i 's|applicationId = "com.wizmart.wizmart_app"|applicationId = "com.wizmart.wizmart_app.dev"|' \
            android/app/build.gradle.kts
          # Confere que o sed pegou (falha o build se não).
          grep -q '\[DEV\]' android/app/src/main/AndroidManifest.xml
          grep -q 'wizmart_app.dev' android/app/build.gradle.kts

      - name: Decodificar upload-keystore
        if: ${{ env.UPLOAD_KEYSTORE_BASE64 != '' }}
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          echo "$UPLOAD_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          echo "UPLOAD_KEYSTORE_PATH=$RUNNER_TEMP/upload-keystore.jks" >> $GITHUB_ENV

      - name: Build APK release
        env:
          GITHUB_BUG_TOKEN: ${{ secrets.BUG_REPORT_PAT }}
          APP_VERSION: ${{ steps.meta.outputs.version }}
          BUILD_TIME: ${{ steps.meta.outputs.build_time }}
          BUILD_NUMBER: ${{ github.run_number }}
          # Variáveis lidas pelo signingConfig em android/app/build.gradle.kts
          # Quando estiverem vazias (sem secrets configuradas), o gradle cai
          # para a debug keystore — apk só instalável em dev.
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define=GITHUB_BUG_TOKEN="$GITHUB_BUG_TOKEN" \
            --dart-define=APP_VERSION="$APP_VERSION" \
            --dart-define=BUILD_TIME="$BUILD_TIME" \
            --dart-define=BUILD_NUMBER="$BUILD_NUMBER"

      - name: Renomear APK (versão rastreável + cópia fixa)
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             "${{ steps.meta.outputs.apk_name }}"
          # Cópia com nome FIXO — usada como URL estável pra compartilhar
          # com novos usuários (ex: link no WhatsApp). Sobrescreve a cada
          # build, então a mesma URL sempre serve a versão mais recente.
          # Em dev o nome é '-dev' pra não colidir com o de produção.
          cp build/app/outputs/flutter-apk/app-release.apk \
             "${{ steps.meta.outputs.fixed_name }}"

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.apk_name }}
          path: ${{ steps.meta.outputs.apk_name }}
          retention-days: 30

      # ── Publicação dos releases ─────────────────────────────────────────
      # main → v-latest (canal de PRODUÇÃO, visto por promotores)
      # dev  → v-dev    (canal de TESTE pra desenvolvedor; promotores
      #                  em produção NÃO veem esse release porque o
      #                  app instalado checa apenas v-latest)

      - name: Publicar release v-latest (PRODUÇÃO)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v-latest --yes --cleanup-tag 2>/dev/null || true
          # Regra padrão D+1: o app só obriga atualização no primeiro
          # acesso do DIA SEGUINTE ao publish. Pra forçar atualização
          # imediata em algum build específico, edite o release no
          # GitHub e adicione o marker `[FORCE-UPDATE]` no body.
          gh release create v-latest \
            "${{ steps.meta.outputs.apk_name }}" \
            "${{ steps.meta.outputs.fixed_name }}" \
            --title "Promotor Wizmart v${{ steps.meta.outputs.version }} (build ${{ github.run_number }})" \
            --notes "Build automático do commit ${{ github.sha }} em ${{ steps.meta.outputs.build_time }}." \
            --target ${{ github.sha }}

      - name: Publicar release v-dev (TESTE)
        if: github.ref == 'refs/heads/dev'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v-dev --yes --cleanup-tag 2>/dev/null || true
          gh release create v-dev \
            "${{ steps.meta.outputs.apk_name }}" \
            "${{ steps.meta.outputs.fixed_name }}" \
            --title "[DEV] Promotor Wizmart v${{ steps.meta.outputs.version }} (build ${{ github.run_number }})" \
            --notes "Build de TESTE — applicationId 'com.wizmart.wizmart_app.dev' (instala lado a lado com prod, dados isolados). Não distribuir pra promotores. Commit ${{ github.sha }} em ${{ steps.meta.outputs.build_time }}." \
            --prerelease \
            --target ${{ github.sha }}
